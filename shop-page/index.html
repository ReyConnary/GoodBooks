<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Shop</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#1e1e1e;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    display:flex;
    justify-content:center;
    gap:30px;
    margin-top:10px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0 0 10px 0;
}

.price{
    color:#27ae60;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#1e1e1e;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e1e1e;
    color:white;
    margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>Simple Shop</h1>
<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Cart</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="container">

<div class="products">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<div class="card-content">
<h3>Product One</h3>
<div class="price">$19.99</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<div class="card-content">
<h3>Product Two</h3>
<div class="price">$24.99</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<div class="card-content">
<h3>Product Three</h3>
<div class="price">$29.99</div>
<button>Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<div class="card-content">
<h3>Product Four</h3>
<div class="price">$34.99</div>
<button>Add to Cart</button>
</div>
</div>

</div>

</div>

<footer>
<p>© 2026 Simple Shop</p>
</footer>

</body>
</html>
